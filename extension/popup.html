<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      background: #0f0f1a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 16px;
      border-bottom: 2px solid #e94560;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header img { width: 32px; height: 32px; border-radius: 6px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #e94560; }
    .header span { font-size: 11px; color: #888; }
    .status-card {
      margin: 12px;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid #2a2a3e;
    }
    .status-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .status-row:last-child { margin-bottom: 0; }
    .label { color: #888; }
    .value { font-weight: 600; }
    .live { color: #4caf50; }
    .not-live { color: #e94560; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill.on { background: #1b5e20; color: #69f0ae; }
    .pill.off { background: #4a0000; color: #ff5252; }
    section {
      margin: 0 12px 12px;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid #2a2a3e;
    }
    section h2 { font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 10px; letter-spacing: 0.5px; }
    label { display: block; color: #bbb; margin-bottom: 3px; font-size: 12px; }
    input[type="text"], input[type="tel"], select {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      color: #f0f0f0;
      padding: 7px 10px;
      font-size: 12px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus, select:focus { border-color: #e94560; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    .slider:before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #e94560; }
    input:checked + .slider:before { transform: translateX(16px); }
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 6px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #e94560; color: white; }
    .btn-secondary { background: #1e3a5f; color: #90caf9; }
    .btn-danger { background: #4a0000; color: #ff5252; }
    .save-msg {
      text-align: center;
      color: #69f0ae;
      font-size: 11px;
      height: 16px;
      margin-top: 4px;
    }
    .footer {
      text-align: center;
      padding: 8px;
      color: #444;
      font-size: 10px;
      border-top: 1px solid #1a1a2e;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🏏 RCB Ticket Bot</h1>
      <span id="cycleInfo">Loading...</span>
    </div>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span class="label">Tickets</span>
      <span class="value" id="pageState">—</span>
    </div>
    <div class="status-row">
      <span class="label">Last check</span>
      <span class="value" id="lastCheck">—</span>
    </div>
    <div class="status-row">
      <span class="label">Monitoring</span>
      <span id="monitoringStatus">—</span>
    </div>
  </div>

  <section>
    <h2>Settings</h2>
    <label>Your Phone Number (for OTP)</label>
    <input type="tel" id="phone" placeholder="+919686193992" />

    <label>Stand Preference</label>
    <select id="standPref">
      <option value="B Stand">B Stand → C → D → A</option>
      <option value="C Stand">C Stand → D → A → B</option>
      <option value="A Stand">A Stand → B → C → D</option>
    </select>

    <div class="toggle-row">
      <span style="color:#bbb; font-size:12px;">Auto-buy when live</span>
      <label class="toggle">
        <input type="checkbox" id="autoBuy" />
        <span class="slider"></span>
      </label>
    </div>

    <button class="btn btn-primary" id="saveBtn">Save Settings</button>
    <div class="save-msg" id="saveMsg"></div>
  </section>

  <section>
    <h2>Actions</h2>
    <button class="btn btn-secondary" id="checkNowBtn">🔍 Check Now</button>
    <button class="btn btn-secondary" id="openTabBtn">🌐 Open Ticket Page</button>
    <button class="btn btn-danger" id="resetBtn">↺ Reset State</button>
  </section>

  <div class="footer">Monitoring: shop.royalchallengers.com/ticket</div>

  <script src="popup.js"></script>
</body>
</html>
