apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: rcb-monitor
  namespace: default
spec:
  hosts:
    - rcb-monitor.yourdomain.com
  gateways:
    - your-gateway
  http:
    - match:
        - uri:
            prefix: /health
        - uri:
            prefix: /notify-test
      route:
        - destination:
            host: rcb-monitor
            port:
              number: 80
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: rcb-monitor
  namespace: default
spec:
  host: rcb-monitor
  trafficPolicy:
    connectionPool:
      http:
        http1MaxPendingRequests: 10
        http2MaxRequests: 100
